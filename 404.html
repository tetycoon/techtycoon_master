<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tech Tycoon - Redirecting</title>
  <script>
    // Supports SPA routing by redirecting all requests to index.html with the pathname as a query parameter
    // This is needed for hosting environments like GitHub Pages that don't have built-in SPA support
    sessionStorage.setItem('spa_redirect_path', window.location.pathname + window.location.search);
    window.location.href = '/';
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
